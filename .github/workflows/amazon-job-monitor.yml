name: Amazon Job Monitor

on:
  workflow_dispatch:
    inputs:
      send_test_alert:
        description: "Send a test WhatsApp message and phone call"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: amazon-job-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the monitor
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_PHONE: ${{ secrets.TWILIO_FROM_PHONE }}
          ALERT_TO_PHONE: ${{ secrets.ALERT_TO_PHONE }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          ALERT_TO_WHATSAPP: ${{ secrets.ALERT_TO_WHATSAPP }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.send_test_alert }}" = "true" ]; then
            python main.py --test-alert
          else
            python main.py --once
          fi

      - name: Save updated seen jobs
        run: |
          if git diff --quiet -- seen_jobs.json; then
            echo "seen_jobs.json did not change."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          git commit -m "Update seen Amazon jobs"
          git push
